name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install development tooling
        run: npm ci

      - name: Run validation
        run: npm run ci

      - name: Build tagged release assets
        run: npm run build -- --tag "${GITHUB_REF_NAME}"

      - name: Verify release archive
        run: unzip -t release/aov-skjaldborg.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "${GITHUB_REF_NAME}" \
            release/aov-skjaldborg.zip \
            release/module.json \
            release/SHA256SUMS.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Age of Vikings - Skjaldborg ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            ${prerelease_flag}
