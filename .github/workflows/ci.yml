name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install development tooling
        run: npm ci

      - name: Run validation
        run: npm run ci

      - name: Build installable module assets
        run: npm run build

      - name: Verify release archive
        run: unzip -t dist/aov-skjadlborg.zip

      - name: Upload CI build
        uses: actions/upload-artifact@v4
        with:
          name: aov-skjadlborg-${{ github.sha }}
          path: |
            dist/aov-skjadlborg.zip
            dist/module.json
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
